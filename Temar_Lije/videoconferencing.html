<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Session - Temar Lije</title>

<style>
    @media (max-width: 768px) {
    body {
        width: 100%;
        padding: 10px;
    }
    .navbar {
        flex-direction: column;
    }
    img {
        width: 100%;
        height: auto;
    }

    h1 {
        font-size: 24px;
    }
    button {
        width: 100%;
    }
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-image: url(Images/image6.jpg);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
}

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.4);
    z-index: 0;
}

header {
    position: relative;
    z-index: 1;
    background:transparent;
    backdrop-filter: blur(10px);
    color: white;
    padding: 18px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 { font-size: 22px; }

nav a{
    list-style: none;
    list-style-type: none;
    display: inline-flex;
    flex-direction: row;
    margin: 5px auto;
    text-decoration: none;
    margin-top: 5px;
    padding: 5px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 20px;
    border-right: 1px green solid;
}

nav a:visited{
    text-decoration: none;
    color: inherit;
}
nav a:hover{
    cursor: pointer;
    text-decoration: none;
    text-shadow: 
        0 0 10px green,
        0 0 60px rgb(3, 73, 3);
    text-transform: uppercase;
    transform: translateX(-5px);
}

nav a:last-child{
    border-right: none;
}

section {
    position: relative;
    z-index: 1;
    background: transparent;
    backdrop-filter: blur(8px);
    border: 2px solid lightcyan;
    border-radius: 20px;
    width: 60%;
    margin: 30px auto;
    padding: 30px 40px;
    color: white;
    text-align: center;
}

h2 {
    color: white;
    font-size: 22px;
    margin-bottom: 20px;
    text-align: center;
}

.info {
    font-size: 15px;
    margin: 8px 0;
    opacity: 0.9;
}

.info b { color: lightgreen; }

.live-badge {
    display: inline-block;
    background: red;
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%   { opacity: 1; }
    50%  { opacity: 0.4; }
    100% { opacity: 1; }
}

.timer {
    font-size: 36px;
    font-weight: 700;
    color: lightgreen;
    margin: 20px 0;
}

.video-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 24px 0;
    flex-wrap: wrap;
}

.video-box {
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    width: 200px;
    height: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.video-box.you {
    border-color: lightgreen;
}

.avatar {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: rgba(0,150,0,0.5);
    border: 2px solid lightgreen;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: white;
}

.video-box p {
    font-size: 13px;
    opacity: 0.85;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin: 10px 0 20px;
}

.ctrl-btn {
    padding: 10px 22px;
    border-radius: 40px;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

.ctrl-btn:hover { background: rgba(255,255,255,0.25); }

.ctrl-btn.off {
    background: rgba(255,80,80,0.4);
    border-color: red;
}

.end-btn {
    padding: 12px 30px;
    border-radius: 40px;
    border: none;
    background: red;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
}

.end-btn:hover { background: darkred; }



footer {
    position: relative;
    z-index: 1;
    background:transparent;
    backdrop-filter: blur(10px);
    color: white;
    text-align: center;
    padding: 14px;
    font-size: 13px;
}
</style>
</head>

<body>

<header>
    <h2>Temar Lije</h2>
    <nav>
        <a href="home_page.html">Home Page</a>
        <a href="progress.html">Progress</a>
        <a href="registration.html">Logout</a>
    </nav>
</header>

<section>

    <span class="live-badge">● LIVE</span>

    <h2>Live Tutoring Session</h2>

    <p class="info">Subject: <b>Mathematics</b></p>
    <p class="info">Tutor: <b>Mr. Abebe</b></p>
    <p class="info">Session Type: <b>Online</b></p>

    <div class="timer" id="timer">00:00:00</div>

    <!-- Video Boxes -->
    <div class="video-area">
        <div class="video-box">
            <div class="avatar">MA</div>
            <p>Mr. Abebe (Tutor)</p>
        </div>
        <div class="video-box you">
            <div class="avatar">S</div>
            <p>You (Student)</p>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎙️ Mute</button>
        <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">📷 Camera</button>
    </div>

    <button class="end-btn" onclick="endCall()">📵 End Session</button>
</section>

<footer>
    <p>© 2026 Temar Lje Tutor Center</p>
</footer>

<script>

let seconds = 0;
setInterval(() => {
    seconds++;
    let h = String(Math.floor(seconds / 3600)).padStart(2, '0');
    let m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    let s = String(seconds % 60).padStart(2, '0');
    document.getElementById("timer").innerHTML = h + ":" + m + ":" + s;
}, 1000);

// Mic
let micOn = true;
function toggleMic() {
    micOn = !micOn;
    let btn = document.getElementById("micBtn");
    btn.innerHTML = micOn ? "🎙️ Mute" : "🔇 Unmute";
    btn.className = micOn ? "ctrl-btn" : "ctrl-btn off";
}

// Camera
let camOn = true;
function toggleCam() {
    camOn = !camOn;
    let btn = document.getElementById("camBtn");
    btn.innerHTML = camOn ? "📷 Camera" : "🚫 Camera Off";
    btn.className = camOn ? "ctrl-btn" : "ctrl-btn off";
}

// Chat
function sendMessage() {
    let input = document.getElementById("chatInput");
    let text  = input.value.trim();
    if (!text) return;
    let messages = document.getElementById("chatMessages");
    let msg      = document.createElement("div");
    msg.className = "msg student";
    msg.innerHTML = '<div class="sender">You</div>' + text;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
    input.value = "";
}

function endCall() {
    if (confirm("End the session?")) {
        window.location.href = "dashboard.html";
    }
}
</script>

</body>
</html>
