<!DOCTYPE html>
<html>
<head>
<title>Registration & Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8">
<style>
@media (max-width: 768px) {
    body {
        width: 100%;
        padding: 10px;
    }
    .navbar {
        flex-direction: column;
    }
    img {
        width: 100%;
        height: auto;
    }

    h1 {
        font-size: 24px;
    }
    button {
        width: 100%;
    }
}
body{

    margin: 0;
    padding: 0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    box-sizing: border-box;
    background-image: url(Images/image1.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: row;
    gap: 30px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container{
    width:400px;
    margin:30px auto;
    background:transparent;
    position: relative; 
    border: 1px solid #fff;
    border-radius: 20px;
    backdrop-filter:blur(5px) ;
    padding: 30px 40px;
}
.container h1{
    font-size: 36px;
    text-align: center ;
}
.container input-box{
    width: 100%;
    height: 50px;
    background: lawngreen;
    margin: 30px 0;
}
.container input{
    width: 90%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    border: 2px solid whitesmoke;
    border-radius: 40px;
    font-size: 16px;
    color: whitesmoke;
    padding: 20px 20px 20px 20px;
}
input,select{
    width:100%;
    padding:20px 20px 20px 20px;
    margin:8px 0;
    border-radius: 40px;
    border-color: lightcyan;
    background-color: transparent;
}

button{
    width:100%;
    height: 45px;
    padding:10px;
    background:transparent;
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius: 35px;
    font-weight: 900;
}
.container .login_link{
    font-size: 14px;
    text-align: center;
    margin: 20px 0 15px; 
}
.login_link p a{
    color: #fff;
    text-decoration: none;
    font-weight: 600;
}
.login_link p a:hover{
    text-decoration: underline;
}

h2{
    text-align:center;
    color: #fff;
    font-weight: 800;
}

.message{
    text-align:center;
    color:green;
}

body {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 30px;
}
section:nth-child(2) div {
    width: 400px;
    margin: 30px auto;
    background: transparent;
    border: 1px solid #fff;
    border-radius: 20px;
    backdrop-filter: blur(5px);
    padding: 30px 40px;
    
}
::placeholder {
    color: rgba(255, 255, 255, 0.9);
    font-weight: 500;
}
section:nth-child(2) div input{
    width: 90%;
    background-color: transparent;
    border: 1px solid #fff;
}
.btn{
    display: flex;
    flex-direction: row;
    gap: 5px;
}
.btn :hover{
    transform: scale(0.9);
    background: #fff;
    border-color: #fff;
    text-transform: uppercase;
    color: green;
}
.btn a:visited{
    color: 000000;
}
</style>
</head>

<body>
<section>
<div class="container" style="color: black;">
    <h2>Register Account</h2>
    <input type="input-box" id="name" placeholder="Full Name" required>
    <input type="input-box" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="input-box" id="password" placeholder="Password" required>
    <input type="input-box" id="confirm" placeholder="Confirm Password" required>
    <select id="role">
        <option value="2">Parent</option>
        <option value="3">Tutor</option>
    </select>
    <div class="btn">
    <button onclick="register()" type="submit" >Submit</button>
    <button><a href="home_page.html" style="text-decoration: none;">Home Page</a></button>
    </div>
    <div>
        <input type="text" name="randomID" id="StudentId" disabled placeholder="Student Id">
        <input type="text" name="randomID" id="Studentpassword" disabled placeholder="Student Password">
    </div>
    <script>
    function register() {
    const a = document.getElementById('role').value;
    if (a === '2'){
      window.location.href = "session_booking.html"; 
    }
    else{
        window.location.href = "session_booking_for_T.html";
        } 
    const generatedID = Math.floor(Math.random() * 9000) + 1000;
    const generatedPassword = Math.floor(Math.random() * 9000) + 1000;
    document.getElementById('StudentId').value = generatedID;
    document.getElementById('Studentpassword').value = generatedPassword;
    }
    </script>
</div>
</section>
</body>
</html>
