<!DOCTYPE html>
<html>
<head>
<title>Parent Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8">
<style>

body{
    margin: 0;
    padding: 0;
    font-family: "Comfortaa", sans-serif;
    box-sizing: border-box;
    background-image: url(Images/image1.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: row;
    gap: 30px;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

section{
    width:400px;
    margin:30px auto;
    background:transparent;
    position: relative; 
    border: 1px solid #fff;
    border-radius: 20px;
    backdrop-filter:blur(5px) ;
    padding: 30px 40px;
}
section h1{
    font-size: 36px;
    text-align: center ;
}
section input-box{
    width: 90%;
    height: 50px;
    background: lawngreen;
    margin: 30px 0;
}
section input{
    width: 90%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    border: 2px solid whitesmoke;
    border-radius: 40px;
    font-size: 16px;
    color: whitesmoke;
    padding: 20px 20px 20px 20px;
}
input,select{
    width:90%;
    padding:20px 20px 20px 20px;
    margin:8px 0;
    border-radius: 40px;
    border-color: lightcyan;
    background-color: transparent;
}

section button{
    width:100%;
    height: 45px;
    padding:10px;
    background:white;
    color:green;
    border:none;
    cursor:pointer;
    border-radius: 35px;
    font-weight: 600;
}

h2{
    text-align:center;
    color: #fff;
}
section ::placeholder{
    font-weight: 500;
    color: #fff;
}


body {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 30px;
}
.btn{
    display: flex;
    flex-direction: row;
    gap: 5px;
}.btn :hover{
    transform: scale(0.9);
    background: #fff;
    border-color: #fff;
    text-transform: uppercase;
    color: green;
}
</style>
</head>

<body>
<section>
    <div>
    <h2>Login</h2>
    <input type="text" id="loginemail" placeholder="Id">
    <input type="password" id="loginpassword" placeholder="Password">
    <div class="btn">
    <button onclick="login()"<a href="progress.html" style="text-decoration: none;">>Login</button>
    <button><a href="home_page.html" style="text-decoration: none;">Home Page</a></button>
    </div>
    <p class="message" id="loginmsg"></p>
</div>

<script>

function register(){
window.location.href = "progress.html"
}

</script>
</section>
</body>
</html>
